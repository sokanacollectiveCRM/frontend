name: Tests (unit + Playwright)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Nightly full E2E run
    - cron: '0 6 * * *'

jobs:
  frontend-unit:
    name: Frontend unit tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-crm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-crm/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm run test:run

  playwright-smoke:
    name: Playwright smoke (PR)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend-crm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-crm/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright (smoke subset)
        run: |
          npx playwright test \
            e2e/ticket6-birth-outcomes-required.spec.ts \
            e2e/ticket2-insurance-card-upload.spec.ts \
            e2e/request-form-payment-method-required.spec.ts \
            e2e/request-form-payment-conditional.spec.ts \
            e2e/clients-leads-customers-tabs.spec.ts \
            e2e/doula-assignments-birth-outcomes-filter.spec.ts \
            --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: frontend-crm/playwright-report

  playwright-full:
    name: Playwright full (nightly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: frontend-crm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-crm/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright (full)
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: frontend-crm/playwright-report

