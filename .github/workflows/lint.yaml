name: Lint and Style Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Run Linters and Formatters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Find changed source files
        id: changed
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            base_sha="${{ github.sha }}^"
          else
            base_sha="${{ github.event.before }}"
          fi
          files=$(git diff --name-only --diff-filter=ACMR "$base_sha" "${{ github.sha }}" -- '*.js' '*.jsx' '*.ts' '*.tsx' | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"
          echo "Changed source files: ${files:-none}"

      - name: Check component file extensions
        if: steps.changed.outputs.files != ''
        shell: bash
        run: |
          invalid=""
          for file in ${{ steps.changed.outputs.files }}; do
            if [[ "$file" == *.js ]] && [[ "$file" != *.test.js ]] && grep -Eq '<[A-Za-z][^>]*>' "$file"; then
              invalid="$invalid$file"$'\n'
            fi
          done
          if [[ -n "$invalid" ]]; then
            echo "These changed .js files contain JSX and must use .jsx:"
            echo "$invalid"
            exit 1
          fi

      - name: Run ESLint on changed files
        if: steps.changed.outputs.files != ''
        run: npx eslint ${{ steps.changed.outputs.files }}

      - name: Check Prettier on changed files
        if: steps.changed.outputs.files != ''
        run: npx prettier --check ${{ steps.changed.outputs.files }}
